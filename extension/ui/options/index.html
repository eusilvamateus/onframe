<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnFrame - Opcoes</title>
  <link rel="stylesheet" href="../../vendor/phosphor/phosphor.css">
  <link rel="stylesheet" href="../../styles/foundations.css">
  <link rel="stylesheet" href="../../styles/components.css">
  <link rel="stylesheet" href="../../styles/shell.css">
  <link rel="stylesheet" href="options.css">
</head>
<body class="ob-shell">
  <main class="page">
    <header class="header">
      <div class="ob-brand">
        <img src="../../assets/logomark.svg" alt="">
        <div>
          <p class="ob-eyebrow">OnFrame</p>
          <h1 class="ob-title">Opcoes da <em>extensao</em></h1>
        </div>
      </div>
      <div class="header-actions">
        <a class="version-tag" id="version-tag" href="https://github.com/eusilvamateus/onframe/releases" target="_blank" rel="noopener noreferrer">v...</a>
        <button class="ob-button secondary ob-icon-button" id="refresh" type="button" title="Atualizar dados" aria-label="Atualizar dados"></button>
      </div>
    </header>

    <section class="panel ob-card" aria-labelledby="service-title">
      <div class="panel-header">
        <h2 class="ob-card-title" id="service-title">Status do OnFrame</h2>
        <span class="ob-badge grey" id="service-badge">Verificando</span>
      </div>
      <p class="ob-copy" id="service-text">Conferindo se o OnFrame esta pronto para editar fotos.</p>
    </section>

    <section class="panel ob-card" aria-labelledby="account-title">
      <div class="panel-header">
        <h2 class="ob-card-title" id="account-title">Conta</h2>
        <span class="panel-actions">
          <span class="ob-badge grey" id="account-badge">Verificando</span>
          <button class="ob-button secondary ob-icon-button compact-icon" id="connect" type="button" title="Conectar conta" aria-label="Conectar conta"></button>
        </span>
      </div>
      <p class="ob-copy" id="account-text">Buscando conta conectada.</p>
      <div class="account-list is-hidden" id="account-list" aria-label="Contas Mercado Livre conectadas"></div>
    </section>
    <p class="action-feedback is-hidden" id="action-feedback"></p>
  </main>

  <script src="../../core/icons.js"></script>
  <script src="../../core/shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
