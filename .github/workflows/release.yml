name: Release package

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run release:check
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME "dist/onframe-release-$($env:GITHUB_REF_NAME).zip" --title "OnFrame $($env:GITHUB_REF_NAME)" --notes-file CHANGELOG.md
